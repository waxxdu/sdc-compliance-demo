// ─────────────────────────────────────────────────────────────────────────────
// DSGVO REGO POLICIES
// These are real, valid OPA Rego policies.
// In production: `opa build policy.rego` → .wasm → loaded in browser via @open-policy-agent/opa-wasm
// In this demo: the same logic runs in the JS engine below (identical results).
// ─────────────────────────────────────────────────────────────────────────────

const REGO_POLICIES = {
  "dsgvo_art44": {
    id: "dsgvo_art44",
    name: "Art. 44 — Drittlandtransfer",
    regulation: "DSGVO Art. 44",
    category: "Datentransfer",
    severity: "CRITICAL",
    rego: `package dsgvo.art44

import rego.v1

eu_eea := {
  "DE","AT","CH","FR","NL","BE","LU","IT","ES","PT",
  "PL","CZ","SK","HU","RO","BG","HR","SI","EE","LV",
  "LT","FI","SE","DK","NO","IS","IE","MT","CY","GR"
}

adequacy_countries := {"GB","JP","CA","NZ","AR","IL","KR"}

valid_bases := {"SCC","BCR","DPF","ADEQUACY"}

# PASS: internal EU/EEA transfer
allow if {
  input.destination_country in eu_eea
}

# PASS: adequacy decision exists
allow if {
  input.destination_country in adequacy_countries
  input.transfer_basis != "NONE"
}

# PASS: valid legal basis provided
allow if {
  input.transfer_basis in valid_bases
}

# Violation details
violation := {
  "rule": "DSGVO-44",
  "action": "BLOCK",
  "alert": "DPO",
  "reason": sprintf(
    "Drittlandtransfer nach %v ohne gültige Rechtsgrundlage (SCC/BCR/DPF/ADEQUACY).",
    [input.destination_country]
  )
} if {
  not allow
}`,
    evaluate: (ev) => {
      const EU = new Set(["DE","AT","CH","FR","NL","BE","LU","IT","ES","PT","PL","CZ","SK","HU","RO","BG","HR","SI","EE","LV","LT","FI","SE","DK","NO","IS","IE","MT","CY","GR"]);
      const ADEQUACY = new Set(["GB","JP","CA","NZ","AR","IL","KR"]);
      const VALID = new Set(["SCC","BCR","DPF","ADEQUACY"]);
      if (EU.has(ev.destination_country)) return { result:"PASS", reason:`${ev.destination_country} ist EU/EWR — interner Transfer.` };
      if (ADEQUACY.has(ev.destination_country) && ev.transfer_basis !== "NONE") return { result:"PASS", reason:`Angemessenheitsbeschluss für ${ev.destination_country}.` };
      if (VALID.has(ev.transfer_basis)) return { result:"PASS", reason:`Gültige Rechtsgrundlage: ${ev.transfer_basis}.` };
      return { result:"FAIL", reason:`Drittlandtransfer nach ${ev.destination_country} ohne gültige Rechtsgrundlage.`, action:"BLOCK", alert:"DPO" };
    }
  },

  "dsgvo_art5_purpose": {
    id: "dsgvo_art5_purpose",
    name: "Art. 5 — Zweckbindung",
    regulation: "DSGVO Art. 5 Abs. 1 lit. b",
    category: "Verarbeitung",
    severity: "HIGH",
    rego: `package dsgvo.art5_purpose

import rego.v1

compatible_purposes := {"RESEARCH","STATISTICS","ARCHIVING"}

# PASS: processing matches consent
allow if {
  input.processing_purpose == input.consent_purpose
}

# PASS: compatible purpose (Art. 5(1)(b))
allow if {
  input.processing_purpose in compatible_purposes
}

violation := {
  "rule": "DSGVO-5",
  "action": "BLOCK",
  "alert": "DPO",
  "reason": sprintf(
    "Zweckänderung: Einwilligung '%v' → Verarbeitung '%v'. Keine Kompatibilität.",
    [input.consent_purpose, input.processing_purpose]
  )
} if {
  not allow
}`,
    evaluate: (ev) => {
      if (!ev.processing_purpose || !ev.consent_purpose) return { result:"SKIP", reason:"Kein Zweck-Attribut — nicht anwendbar." };
      if (ev.processing_purpose === ev.consent_purpose) return { result:"PASS", reason:"Verarbeitungszweck stimmt mit Einwilligung überein." };
      if (["RESEARCH","STATISTICS","ARCHIVING"].includes(ev.processing_purpose)) return { result:"PASS", reason:`Kompatibler Zweck (${ev.processing_purpose}) nach Art. 5(1)(b).` };
      return { result:"FAIL", reason:`Zweckänderung: '${ev.consent_purpose}' → '${ev.processing_purpose}'. Keine Kompatibilität.`, action:"BLOCK", alert:"DPO" };
    }
  },

  "dsgvo_art25_pbd": {
    id: "dsgvo_art25_pbd",
    name: "Art. 25 — Privacy by Design",
    regulation: "DSGVO Art. 25",
    category: "Systemdesign",
    severity: "HIGH",
    rego: `package dsgvo.art25_pbd

import rego.v1

large_volume_threshold := 1000  # MB

# CRITICAL: sensitive data must be encrypted
violation[v] := v if {
  input.sensitive_data == true
  input.encrypted == false
  v := {
    "rule": "DSGVO-25-SENSITIVE",
    "action": "BLOCK",
    "alert": "DPO",
    "severity": "CRITICAL",
    "reason": "Sensible Daten (Art. 9) ohne Verschlüsselung — Privacy by Design verletzt."
  }
}

# WARNING: large unencrypted datasets
violation[v] := v if {
  input.data_volume_mb > large_volume_threshold
  input.encrypted == false
  input.sensitive_data == false
  v := {
    "rule": "DSGVO-25-VOLUME",
    "action": "WARN",
    "severity": "MEDIUM",
    "reason": sprintf("Hohes Datenvolumen (%v MB) ohne Verschlüsselung.", [input.data_volume_mb])
  }
}

allow if { count(violation) == 0 }`,
    evaluate: (ev) => {
      if (ev.sensitive_data && !ev.encrypted) return { result:"FAIL", reason:"Sensible Daten ohne Verschlüsselung — Privacy by Design verletzt.", action:"BLOCK", alert:"DPO" };
      if (ev.data_volume_mb > 1000 && !ev.encrypted) return { result:"WARN", reason:`Hohes Datenvolumen (${ev.data_volume_mb} MB) ohne Verschlüsselung. Prüfung empfohlen.` };
      return { result:"PASS", reason:"Privacy-by-Design-Anforderungen erfüllt." };
    }
  },

  "dsgvo_art30_record": {
    id: "dsgvo_art30_record",
    name: "Art. 30 — Verarbeitungsverzeichnis",
    regulation: "DSGVO Art. 30",
    category: "Dokumentation",
    severity: "MEDIUM",
    rego: `package dsgvo.art30_record

import rego.v1

allow if { input.registered_in_record == true }

violation := {
  "rule": "DSGVO-30",
  "action": "FLAG",
  "alert": "DPO",
  "reason": "Verarbeitungstätigkeit nicht im Verzeichnis nach Art. 30 registriert."
} if {
  not allow
}`,
    evaluate: (ev) => {
      if (ev.registered_in_record === false) return { result:"FAIL", reason:"Verarbeitungstätigkeit nicht im Verzeichnis (Art. 30) registriert.", action:"FLAG", alert:"DPO" };
      return { result:"PASS", reason:"Im Verarbeitungsverzeichnis dokumentiert." };
    }
  },

  "dsgvo_art33_breach": {
    id: "dsgvo_art33_breach",
    name: "Art. 33 — Meldepflicht (72h)",
    regulation: "DSGVO Art. 33",
    category: "Incident",
    severity: "CRITICAL",
    rego: `package dsgvo.art33_breach

import rego.v1

reporting_deadline_hours := 72

# Only applies to breach events
applicable if { input.incident_type == "DATA_BREACH" }

allow if {
  applicable
  input.reported_to_authority == true
}

violation := {
  "rule": "DSGVO-33",
  "action": "ESCALATE",
  "alert": "MANAGEMENT",
  "reason": sprintf(
    "Breach seit %vh — Meldefrist (72h) überschritten!",
    [input.hours_elapsed]
  )
} if {
  applicable
  input.hours_elapsed > reporting_deadline_hours
  not input.reported_to_authority
}

warning := {
  "rule": "DSGVO-33",
  "action": "ALERT",
  "reason": sprintf(
    "Breach seit %vh — noch %vh bis zur Meldefrist.",
    [input.hours_elapsed, reporting_deadline_hours - input.hours_elapsed]
  )
} if {
  applicable
  input.hours_elapsed <= reporting_deadline_hours
  not input.reported_to_authority
}`,
    evaluate: (ev) => {
      if (ev.incident_type !== "DATA_BREACH") return { result:"SKIP", reason:"Kein DATA_BREACH Event — Regel nicht anwendbar." };
      if (ev.reported_to_authority) return { result:"PASS", reason:"Breach fristgerecht gemeldet." };
      if (ev.hours_elapsed > 72) return { result:"FAIL", reason:`Breach seit ${ev.hours_elapsed}h — Meldefrist (72h) überschritten!`, action:"ESCALATE", alert:"MANAGEMENT" };
      return { result:"WARN", reason:`Breach seit ${ev.hours_elapsed}h — noch ${72 - ev.hours_elapsed}h bis zur Frist.` };
    }
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// CLAUDE AGENT — generates real Rego from natural language
// ─────────────────────────────────────────────────────────────────────────────

async function callClaudeAgent(userText) {
  // Uses a CORS proxy to forward to Anthropic API
  // In production: deploy your own proxy endpoint
  const PROXY = "https://corsproxy.io/?url=https://api.anthropic.com/v1/messages";

  const systemPrompt = `You are a Specification-Driven Compliance (SDC) agent.
Your job: Convert regulatory text or compliance requirements into executable OPA Rego policies AND a matching JavaScript evaluator function.

Output ONLY valid JSON in this exact structure (no markdown, no explanation outside JSON):
{
  "policy_name": "Short policy name",
  "regulation_ref": "e.g. DSGVO Art. X",
  "category": "One of: Datentransfer, Verarbeitung, Systemdesign, Dokumentation, Incident",
  "severity": "One of: CRITICAL, HIGH, MEDIUM, LOW",
  "description": "One sentence description",
  "rego": "Complete valid OPA Rego policy as a string. Use package name: custom.generated. Use rego.v1 import. Define allow rule and violation object.",
  "input_fields": [
    {"field": "snake_case_field_name", "type": "string|boolean|number", "label": "Human label", "options": ["opt1","opt2"] }
  ],
  "js_logic": "A JavaScript arrow function body as a string. It receives (ev) where ev has all input_fields as properties. It must return {result:'PASS'|'FAIL'|'WARN'|'SKIP', reason:'string', action?:'BLOCK|FLAG|ESCALATE|WARN', alert?:'DPO|MANAGEMENT'}"
}

Rules:
- The Rego must be syntactically correct OPA Rego v1
- The js_logic must produce identical results to the Rego policy
- input_fields defines what the user needs to fill in to test this policy
- Be specific, not generic. The spec must be testable with binary logic.`;

  // N8N proxy endpoint - handles CORS and forwards to Anthropic
  const N8N_PROXY = "https://n8n.cosmos.tumaki.de/webhook/sdc-spec-generator";

  // Try n8n proxy first, then direct (works in Claude artifacts)
  const endpoints = [N8N_PROXY, "https://api.anthropic.com/v1/messages"];

  let lastError = null;
  for (const endpoint of endpoints) {
    try {
      const isProxy = endpoint === N8N_PROXY;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(isProxy
          ? { userText, systemPrompt }  // n8n expects wrapped payload
          : {                           // Anthropic expects direct format
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: systemPrompt,
              messages: [{ role: "user", content: userText }]
            }
        )
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      // n8n returns {result: "..."} or Anthropic returns {content: [...]}
      const text = isProxy
        ? (data.result || data.content?.[0]?.text || "")
        : (data.content?.[0]?.text || "");
      const clean = text.replace(/```json|```/g, "").trim();
      return JSON.parse(clean);
    } catch(e) {
      lastError = e;
      continue;
    }
  }
  throw new Error("Spec Generator nicht erreichbar. Details: " + lastError?.message);
}

// ─────────────────────────────────────────────────────────────────────────────
// SDC ENGINE RUNNER
// ─────────────────────────────────────────────────────────────────────────────

function runEngine(event, activePolicies) {
  return activePolicies.map(id => {
    const policy = REGO_POLICIES[id];
    if (!policy) return null;
    const outcome = policy.evaluate(event);
    return { policy, ...outcome };
  }).filter(Boolean);
}

// ─── REGO SYNTAX HIGHLIGHTER ─────────────────────────────────────────────────

function RegoBlock({ code }) {
  const highlighted = code
    .replace(/\b(package|import|if|not|in|default|else|some|every|contains|with)\b/g, '<span class="rk">$1</span>')
    .replace(/\b(allow|violation|warning|deny)\b(?=\s*[:{]|\s+if)/g, '<span class="rs">$&</span>')
    .replace(/"([^"]*)"/g, '<span class="rv">"$1"</span>')
    .replace(/(#.*)/g, '<span class="rc2">$1</span>');
  return <pre className="rego-block" dangerouslySetInnerHTML={{ __html: highlighted }} />;
}

function ResultCard({ r, delay }) {
  const [regoOpen, setRegoOpen] = useState(false);
  return (
    <div className={`result-card ${r.result}`} style={{ animationDelay: `${delay}s` }}>
      <div className="rc-head">
        <span className={`rc-badge b-${r.result}`}>{r.result}</span>
        <span className="rc-name">{r.policy.name}</span>
        <span className="rc-reg">{r.policy.regulation}</span>
      </div>
      <div className="rc-body">
        <div className="rc-reason">{r.reason}</div>
        {(r.action || r.alert) && (
          <div className="rc-actions">
            {r.action && <span className={r.result === "WARN" ? "act-warn" : "act-block"}>⚡ {r.action}</span>}
            {r.alert && <span className="act-alert">🔔 ALERT → {r.alert}</span>}
          </div>
        )}
        <div className="rego-toggle" onClick={() => setRegoOpen(o => !o)}>
          {regoOpen ? "▾" : "▸"} Rego Policy anzeigen
        </div>
        {regoOpen && <RegoBlock code={r.policy.rego} />}
      </div>
    </div>
  );
}

// ─── AGENT TAB ────────────────────────────────────────────────────────────────

function AgentTab() {
  const [input, setInput] = useState("Artikel 17 DSGVO: Betroffene Personen haben das Recht, die Löschung ihrer Daten zu verlangen. Verarbeiter müssen dem binnen 30 Tagen nachkommen, es sei denn, es bestehen gesetzliche Aufbewahrungspflichten.");
  const [loading, setLoading] = useState(false);
  const [generated, setGenerated] = useState(null);
  const [error, setError] = useState(null);
  const [testValues, setTestValues] = useState({});
  const [testResult, setTestResult] = useState(null);

  async function generate() {
    setLoading(true);
    setError(null);
    setGenerated(null);
    setTestResult(null);
    try {
      const result = await callClaudeAgent(input);
      setGenerated(result);
      const defaults = {};
      (result.input_fields || []).forEach(f => {
        defaults[f.field] = f.type === "boolean" ? false : f.type === "number" ? 0 : (f.options?.[0] || "");
      });
      setTestValues(defaults);
    } catch (e) {
      setError("Fehler: " + e.message);
    }
    setLoading(false);
  }

  function runTest() {
    if (!generated) return;
    try {
      // eslint-disable-next-line no-new-func
      const fn = new Function("ev", generated.js_logic + "\n return evaluate(ev);");
      // Try calling it as evaluate(ev)
      let result;
      try {
        result = fn(testValues);
      } catch {
        // fallback: the js_logic might be a direct expression
        const fn2 = new Function("ev", "return (" + generated.js_logic + ")(ev);");
        result = fn2(testValues);
      }
      setTestResult(result);
    } catch (e) {
      setTestResult({ result: "ERROR", reason: e.message });
    }
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "1.25rem" }}>
      <div>
        <div style={{ fontFamily: "var(--display)", fontSize: "22px", fontWeight: "800", marginBottom: "6px" }}>
          SDC <span style={{ color: "var(--teal)", fontStyle: "italic" }}>Spec Generator</span>
        </div>
        <div style={{ fontSize: "11px", color: "var(--slate)", lineHeight: "1.7" }}>
          Gib einen Regulierungstext oder eine Compliance-Anforderung ein. Der Agent generiert daraus eine testbare OPA Rego Policy — und beweist damit das SDC-Konzept in Echtzeit.
        </div>
      </div>

      <div className="agent-box">
        <div className="box-title">Regulierungstext / Anforderung</div>
        <textarea
          className="agent-input"
          value={input}
          onChange={e => setInput(e.target.value)}
          placeholder="z.B. 'Datentransfers in die USA erfordern Standard-Vertragsklauseln gemäß Art. 46 DSGVO...'"
        />
        <button className="agent-btn" onClick={generate} disabled={loading || !input.trim()}>
          {loading ? "⚙ Agent generiert Spec..." : "⚡ Spec generieren"}
        </button>
        {error && <div style={{ marginTop: "10px", fontSize: "11px", color: "var(--red)", padding: "8px", background: "var(--red-dim)", borderRadius: "6px" }}>{error}</div>}
      </div>

      {generated && (
        <div className="agent-result">
          <div className="ar-header">
            <span className="ar-tag">GENERIERT</span>
            <span className="ar-name">{generated.policy_name}</span>
          </div>
          <div className="ar-meta">
            {generated.regulation_ref} · {generated.category} · <span className={`sev-${generated.severity}`}>{generated.severity}</span>
          </div>
          <div style={{ fontSize: "11px", color: "var(--ice)", marginBottom: "1rem", lineHeight: "1.6" }}>{generated.description}</div>

          <div style={{ marginBottom: "1rem" }}>
            <div className="sec-label" style={{ marginBottom: ".5rem" }}>Generierte Rego Policy</div>
            <RegoBlock code={generated.rego} />
          </div>

          {generated.input_fields?.length > 0 && (
            <div style={{ marginBottom: "1rem" }}>
              <div className="sec-label" style={{ marginBottom: ".5rem" }}>Regel testen</div>
              <div className="ar-fields">
                {generated.input_fields.map(f => (
                  <div key={f.field} className="ar-field">
                    <span className="ar-field-label">{f.label}</span>
                    {f.type === "boolean"
                      ? <input type="checkbox" className="fcheck" checked={!!testValues[f.field]} onChange={e => setTestValues(v => ({ ...v, [f.field]: e.target.checked }))} />
                      : f.options?.length > 0
                        ? <select className="ar-field-input" value={testValues[f.field] || ""} onChange={e => setTestValues(v => ({ ...v, [f.field]: e.target.value }))}>
                            {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                          </select>
                        : <input type={f.type === "number" ? "number" : "text"} className="ar-field-input" value={testValues[f.field] || ""} onChange={e => setTestValues(v => ({ ...v, [f.field]: f.type === "number" ? Number(e.target.value) : e.target.value }))} />
                    }
                  </div>
                ))}
              </div>
              <button className="ar-test-btn" onClick={runTest}>▶ Regel testen</button>
              {testResult && (
                <div className={`ar-result ${testResult.result}`} style={{ marginTop: ".75rem" }}>
                  <strong>{testResult.result}</strong> — {testResult.reason}
                  {testResult.action && <span style={{ marginLeft: "8px" }}>⚡ {testResult.action}</span>}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                        <label className="fl">Datenvolumen (MB)</label>
                        <input className="fi" type="number" value={event.data_volume_mb} onChange={e => setEvent(ev => ({ ...ev, data_volume_mb: parseInt(e.target.value) || 0 }))} />
                      </div>
                      <div className="fg">
                        <label className="fl">Verarbeitungszweck</label>
                        <select className="fsel" value={event.processing_purpose} onChange={e => setEvent(ev => ({ ...ev, processing_purpose: e.target.value }))}>
                          {["SERVICE_DELIVERY","ANALYTICS","MARKETING","CRM","RESEARCH","STATISTICS"].map(o => <option key={o}>{o}</option>)}
                        </select>
                      </div>
                      <div className="fg">
                        <label className="fl">Einwilligungs-Zweck</label>
                        <select className="fsel" value={event.consent_purpose} onChange={e => setEvent(ev => ({ ...ev, consent_purpose: e.target.value }))}>
                          {["SERVICE_DELIVERY","ANALYTICS","MARKETING","CRM"].map(o => <option key={o}>{o}</option>)}
                        </select>
                      </div>
                      <div className="fg">
                        <label className="fl">Optionen</label>
                        <div style={{ display: "flex", flexDirection: "column", gap: "6px", paddingTop: "3px" }}>
                          {[["encrypted","Verschlüsselt"],["sensitive_data","Sensible Daten (Art. 9)"],["registered_in_record","Im Verarbeitungsverzeichnis"]].map(([field, label]) => (
                            <label key={field} className="checkbox-row">
                              <input type="checkbox" className="fcheck" checked={!!event[field]} onChange={e => setEvent(ev => ({ ...ev, [field]: e.target.checked }))} />
                              <span className="check-label">{label}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    </div>
                    <button className={`run-btn ${running ? "running" : ""}`} onClick={runCompliance} disabled={running}>
                      {running ? "⚙ Engine evaluiert Rego Policies..." : "▶ Compliance prüfen"}
                    </button>
                  </div>

                  {hasRun && (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                      <div className="results-header">
                        <span className="results-label">Engine Output</span>
                        <div className="pills">
                          {totals.pass > 0 && <span className="pill p-pass">✓ {totals.pass} PASS</span>}
                          {totals.fail > 0 && <span className="pill p-fail">✗ {totals.fail} FAIL</span>}
                          {totals.warn > 0 && <span className="pill p-warn">⚠ {totals.warn} WARN</span>}
                          {totals.skip > 0 && <span className="pill p-skip">— {totals.skip} SKIP</span>}
                        </div>
                      </div>
                      {results.map((r, i) => <ResultCard key={i} r={r} delay={i * 0.05} />)}
                    </div>
                  )}

                  {!hasRun && !running && (
                    <div className="empty-state">
                      <div className="empty-icon">⚡</div>
                      <div className="empty-txt">Szenario wählen und Engine starten</div>
                    </div>
                  )}
                </>
              )}

              {mainTab === "agent" && <AgentTab />}

              {mainTab === "policies" && (
                <>
                  <div style={{ fontFamily: "var(--display)", fontSize: "22px", fontWeight: "800", marginBottom: "5px" }}>
                    Policy <span style={{ color: "var(--teal)", fontStyle: "italic" }}>Manager</span>
                  </div>
                  <div style={{ fontSize: "11px", color: "var(--slate)", marginBottom: "1rem" }}>
                    Alle DSGVO Rego-Policies. Jede ist testbar, versionierbar, audit-ready. In Produktion: <code style={{ color: "var(--amber)", fontSize: "10px" }}>opa build</code> → WASM → Browser.
                  </div>
                  {Object.values(REGO_POLICIES).map(p => (
                    <div key={p.id} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: "10px", padding: "1.25rem", marginBottom: "1rem" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}>
                        <div>
                          <div style={{ fontWeight: "700", fontSize: "14px", marginBottom: "4px" }}>{p.name}</div>
                          <div style={{ fontSize: "10px", color: "var(--teal)", marginBottom: "4px" }}>{p.regulation} · {p.category}</div>
                          <div style={{ fontSize: "10px", color: "var(--slate)" }}>Severity: <span className={`sev-${p.severity}`}>{p.severity}</span></div>
                        </div>
                        <button className={`toggle ${activePolicies.has(p.id) ? "on" : "off"}`} onClick={() => togglePolicy(p.id)} />
                      </div>
                      <RegoBlock code={p.rego} />
                    </div>
                  ))}
                </>
              )}
            </div>
          </main>

          {/* AUDIT PANEL */}
          <aside className="audit">
            <div className="audit-head">
              <div className="audit-title">Audit Log</div>
              {auditLog.length > 0 && <button className="clear-btn" onClick={() => setAuditLog([])}>leeren</button>}
            </div>
            <div className="audit-stats">
              <div className="astat"><div className={`astat-val ${logTotals.fail > 0 ? "r" : "g"}`}>{logTotals.fail}</div><div className="astat-label">Violations</div></div>
              <div className="astat"><div className="astat-val g">{logTotals.pass}</div><div className="astat-label">Passed</div></div>
              <div className="astat"><div className="astat-val w">{logTotals.warn}</div><div className="astat-label">Warnings</div></div>
              <div className="astat"><div className="astat-val s">{auditLog.length}</div><div className="astat-label">Runs</div></div>
            </div>
            <div className="audit-log">
              {auditLog.length === 0 && (
                <div className="empty-state" style={{ padding: "1.5rem 1rem" }}>
                  <div className="empty-icon" style={{ fontSize: "22px" }}>📋</div>
                  <div className="empty-txt" style={{ fontSize: "10px" }}>Noch keine Runs</div>
                </div>
              )}
              {auditLog.map((entry, i) => (
                <div key={entry.id} className="alog-entry" style={{ animationDelay: `${i * 0.04}s` }}>
                  <div className="alog-time">{entry.time}</div>
                  <div className="alog-event">{entry.event}</div>
                  <div className="alog-dots">
                    {entry.results.map((r, j) => <div key={j} className={`adot adot-${r.result}`} title={`${r.policy.name}: ${r.result}`} />)}
                  </div>
                  <div className="alog-pills">
                    {entry.fail > 0 && <span className="pill p-fail" style={{ fontSize: "9px", padding: "1px 6px" }}>✗ {entry.fail}</span>}
                    {entry.pass > 0 && <span className="pill p-pass" style={{ fontSize: "9px", padding: "1px 6px" }}>✓ {entry.pass}</span>}
                    {entry.warn > 0 && <span className="pill p-warn" style={{ fontSize: "9px", padding: "1px 6px" }}>⚠ {entry.warn}</span>}
                  </div>
                </div>
              ))}
            </div>
          </aside>
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
